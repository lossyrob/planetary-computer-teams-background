# The image name for the generated background.
# PNG matches the current Teams background files on Windows.
image_name: pc-teams-background.png

# The folder Teams uses for background images.
# Leave blank to auto-detect the current Windows Teams folder.
# The script checks these paths in order:
#   %LOCALAPPDATA%\Packages\MSTeams_8wekyb3d8bbwe\LocalCache\Microsoft\MSTeams\Backgrounds\Uploads
#   %LOCALAPPDATA%\Microsoft\MSTeams\Backgrounds\Uploads
#   %APPDATA%\Microsoft\Teams\Backgrounds\Uploads
teams_image_folder:

# AOIs defines areas you want to highlight. The background generation
# script will prefer to use new images over AOIs over anything. If
# there are no new images or no AOIs provided, the script will
# use the area of a randomly selected recent image.
#
# aois:
#   # A FeatureCollection GeoJSON of areas
#   # to highlight. See the README for more info.
#   # NOTE: The script will edit this file by
#   # adding information to the properties
#   # of features.
#   feature_collection_path:
#   # If a new Item is found over a AOI, don't recreate
#   # the background until this many days have passed.
#   refresh_days: 1

# AI-curated suggestions for interesting satellite imagery.
# When enabled, asks an LLM (via the Copilot SDK) to suggest
# timely, visually interesting locations before falling back
# to AOIs or random items.
# Requires Node.js and `npm install` in the project root.
#
# ai_suggestions:
#   enabled: true
#   model: claude-sonnet-4   # Model to use (must support vision attachments)
#   timeout_seconds: 120     # Max time per LLM call; dynamic discovery may need more than selection/verify
#   fallback_to_aois: true   # Fall back to AOIs if no AI candidate passes
#   verify_images: true      # Verify the final full-size render with vision
#   salvage_images: true     # Keep a strong image but rewrite the story if needed
#   max_adjust_rounds: 2     # Max crop/zoom retries for the selected candidate
#   max_suggestions_tried: 5 # Max AI-selected finalists before AOI fallback
#   max_templates: 8         # Max dynamically discovered phenomena to scan per run
#   max_items_per_template: 2
#   max_preview_candidates: 12
#   preview_width: 320       # Preview tile width in the candidate contact sheet
#   preview_height: 240
#   history_limit: 10        # Recent accept/reject notes fed back to the selector

# Collections to search items for.
collections:
- id: sentinel-2-l2a
  # Name of rendering option that determines the render configuration
  # to use for the image. Should be the same as the name
  # of the rendering option in the PC Explorer as seen
  # in the dropdown menu.
  # If blank or missing, will default to using the first rendering option
  rendering_option:
  # Searches for items this many days since the time an image is being generated.
  # Defaults to 30 days
  search_days: 30
  # Filters to apply to the search.
  # Recommended to use eo:cloud_cover if available on the collection.
  filters:
    - property: eo:cloud_cover
      op: <=
      value: 10

# Image dimensions
width: 1040
height: 780
thumbnail_width: 200
thumbnail_height: 150

# Require at least this much of the final crop to intersect
# Natural Earth land polygons. Set to 0 to disable the filter.
min_land_fraction: 0.3

# Reject crops that have to shrink too much relative to the requested frame.
# 0 disables the guard; 0.4 means keep at least 40% of the requested width/height.
min_crop_fit_scale_ratio: 0.4

# Provide this to customize where the JSON info about the image
# is saved. Defaults to the same directory as the image,
# with an -info.json suffix.
image_info_path:

apis:
  stac: https://planetarycomputer.microsoft.com/api/stac/v1/
  info: https://planetarycomputer.microsoft.com/api/data/v1/mosaic/info
  item_crop: https://planetarycomputer.microsoft.com/api/data/v1/item/crop

# Maximum search results to pull from the STAC API
max_search_results: 1000

# Maximum time to wait for a image to be regenerated.
# The script uses the last accessed time of the image file
# to determine when a Teams background has been used; however,
# Teams does some caching and may not update the image file
# stats. This setting will force a refresh after a certain
# amount of time has passed. If not provided, defaults to
# waiting for the access time to show a system read.
force_regen_after: 1 day

